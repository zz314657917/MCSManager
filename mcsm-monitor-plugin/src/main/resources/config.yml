agentUrl: "http://127.0.0.1:24444"
serverId: ""
instanceToken: ""
heartbeatIntervalTicks: 100
playerSnapshotIntervalTicks: 100
connectTimeoutMs: 3000
readTimeoutMs: 3000
mainThreadBlockedThresholdMs: 3000
logHeartbeatFailures: true
logUploadFailures: true

endpoints:
  heartbeatPath: "/v1/plugin/heartbeat"
  playerSnapshotPath: "/v1/plugin/player_snapshot"
  chatMessagePath: "/v1/plugin/chat_message"

snapshot:
  includePing: true

chatReporting:
  enabled: true
  reportCancelled: false
  playerChatReflectionEnabled: true

localControl:
  enabled: true
  host: "127.0.0.1"
  port: 25681
  token: ""
  workerThreads: 2
  requestTimeoutMs: 5000

mute:
  persistToDisk: true
  storageFile: "mutes.yml"
  notifyPlayer: true
  defaultReason: "Muted by GM"
